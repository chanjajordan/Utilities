<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#16140f">
<title>FieldKit — Level &amp; Ruler</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#16140f;
    --panel:#1f1c15;
    --panel2:#28241b;
    --line:#3a352a;
    --amber:#f5b41e;
    --amber-dim:#9c7415;
    --bubble:#c4e84a;
    --bubble-glow:#a8d020;
    --txt:#e9e2cf;
    --txt-dim:#8a8270;
    --good:#7ed957;
    --bad:#e8743f;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;}
  body{
    background:
      radial-gradient(circle at 50% -10%, #2a261c 0%, transparent 55%),
      repeating-linear-gradient(0deg, transparent 0 39px, rgba(255,255,255,.012) 39px 40px),
      var(--bg);
    color:var(--txt);
    font-family:'Oswald',sans-serif;
    display:flex;flex-direction:column;
    height:100dvh;
    user-select:none;-webkit-user-select:none;
  }
  .mono{font-family:'JetBrains Mono',monospace;}

  /* ---------- header ---------- */
  header{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 18px 10px;border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,var(--panel) 0%,transparent 100%);
  }
  .brand{display:flex;align-items:baseline;gap:8px;}
  .brand b{font-weight:700;letter-spacing:3px;font-size:18px;color:var(--amber);}
  .brand span{font-size:11px;letter-spacing:2px;color:var(--txt-dim);text-transform:uppercase;}
  .stat{font-size:10px;letter-spacing:1px;color:var(--txt-dim);text-transform:uppercase;display:flex;align-items:center;gap:6px;}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--bad);box-shadow:0 0 6px var(--bad);}
  .dot.live{background:var(--good);box-shadow:0 0 8px var(--good);}

  /* ---------- tabs ---------- */
  .tabs{display:flex;padding:0 14px;gap:8px;margin-top:12px;}
  .tab{
    flex:1;text-align:center;padding:11px 0;font-size:13px;letter-spacing:3px;
    text-transform:uppercase;color:var(--txt-dim);background:var(--panel);
    border:1px solid var(--line);border-bottom:none;border-radius:8px 8px 0 0;
    cursor:pointer;transition:.18s;font-weight:600;
  }
  .tab.on{color:var(--bg);background:var(--amber);border-color:var(--amber);}

  /* ---------- stage ---------- */
  .stage{flex:1;position:relative;overflow:hidden;}
  .view{position:absolute;inset:0;display:none;flex-direction:column;}
  .view.on{display:flex;}

  /* ---------- permission overlay ---------- */
  #perm{
    position:absolute;inset:0;z-index:40;background:rgba(15,13,9,.96);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:36px;gap:20px;
  }
  #perm.hide{display:none;}
  #perm svg{width:64px;height:64px;opacity:.9;}
  #perm h2{font-weight:300;font-size:24px;letter-spacing:1px;}
  #perm p{color:var(--txt-dim);font-size:14px;max-width:300px;line-height:1.5;font-family:'JetBrains Mono',monospace;}
  .btn{
    background:var(--amber);color:var(--bg);border:none;padding:14px 30px;
    font-family:'Oswald';font-weight:700;font-size:14px;letter-spacing:2px;
    text-transform:uppercase;border-radius:10px;cursor:pointer;
    box-shadow:0 6px 20px rgba(245,180,30,.25);
  }
  .btn:active{transform:translateY(1px);}
  .warn{color:var(--bad);font-size:12px;font-family:'JetBrains Mono',monospace;max-width:300px;}

  /* ===================== LEVEL ===================== */
  .levelwrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:18px;}

  .bullseye{
    width:min(64vw,300px);aspect-ratio:1;border-radius:50%;position:relative;
    background:radial-gradient(circle at 50% 38%,var(--panel2),var(--panel));
    border:2px solid var(--line);
    box-shadow:inset 0 0 40px rgba(0,0,0,.6),0 10px 30px rgba(0,0,0,.4);
  }
  .ring{position:absolute;border:1px solid var(--line);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);}
  .ring.r1{width:34%;height:34%;}
  .ring.r2{width:66%;height:66%;}
  .cross{position:absolute;background:var(--line);}
  .cross.h{top:50%;left:8%;right:8%;height:1px;transform:translateY(-.5px);}
  .cross.v{left:50%;top:8%;bottom:8%;width:1px;transform:translateX(-.5px);}
  .center-target{
    position:absolute;top:50%;left:50%;width:17%;height:17%;
    transform:translate(-50%,-50%);border:1.5px dashed var(--amber-dim);border-radius:50%;
  }
  .ball{
    position:absolute;top:50%;left:50%;width:15%;height:15%;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#e8ff8a,var(--bubble) 55%,var(--bubble-glow));
    box-shadow:0 0 16px var(--bubble-glow),inset -2px -3px 6px rgba(0,0,0,.25);
    transform:translate(-50%,-50%);transition:transform .05s linear, box-shadow .2s;
    will-change:transform;
  }
  .ball.lvl{box-shadow:0 0 26px var(--good),inset -2px -3px 6px rgba(0,0,0,.2);
    background:radial-gradient(circle at 35% 30%,#d4ffb0,var(--good) 55%,#4fae34);}

  /* vials */
  .vials{display:flex;flex-direction:column;gap:14px;width:min(82vw,360px);}
  .vial{
    position:relative;height:34px;border-radius:18px;background:var(--panel);
    border:1px solid var(--line);overflow:hidden;
    box-shadow:inset 0 2px 8px rgba(0,0,0,.5);
  }
  .vial .zone{position:absolute;top:0;bottom:0;left:50%;width:34px;transform:translateX(-50%);
    border-left:1px solid var(--amber-dim);border-right:1px solid var(--amber-dim);
    background:rgba(245,180,30,.05);}
  .vial .bub{
    position:absolute;top:50%;left:50%;width:30px;height:24px;border-radius:14px;
    transform:translate(-50%,-50%);
    background:radial-gradient(circle at 40% 35%,#e8ff8a,var(--bubble) 60%,var(--bubble-glow));
    box-shadow:0 0 12px var(--bubble-glow);transition:transform .05s linear;will-change:transform;
  }
  .vial .bub.lvl{background:radial-gradient(circle at 40% 35%,#d4ffb0,var(--good) 60%,#4fae34);box-shadow:0 0 16px var(--good);}
  .vial .tag{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:10px;letter-spacing:2px;color:var(--txt-dim);z-index:2;pointer-events:none;}

  .readout{display:flex;gap:14px;width:min(82vw,360px);}
  .read{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center;}
  .read .lab{font-size:10px;letter-spacing:2px;color:var(--txt-dim);text-transform:uppercase;}
  .read .num{font-size:34px;font-weight:700;line-height:1.1;margin-top:2px;}
  .read .num.ok{color:var(--good);}
  .read .deg{font-size:16px;color:var(--txt-dim);}

  .lvlbtns{display:flex;gap:10px;width:min(82vw,360px);}
  .sbtn{
    flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--txt);
    padding:12px;border-radius:10px;font-family:'Oswald';font-weight:600;font-size:12px;
    letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:.15s;
  }
  .sbtn:active{background:var(--panel);}
  .sbtn.active{background:var(--amber);color:var(--bg);border-color:var(--amber);}

  /* ===================== RULER ===================== */
  .ruler-stage{flex:1;position:relative;overflow:hidden;}
  #ruler-canvas{position:absolute;top:0;left:0;}
  .marker{
    position:absolute;left:0;right:0;height:44px;transform:translateY(-50%);
    z-index:5;touch-action:none;cursor:ns-resize;
  }
  .marker .ln{position:absolute;left:0;right:0;top:50%;height:2px;background:var(--amber);box-shadow:0 0 8px rgba(245,180,30,.6);}
  .marker .grip{
    position:absolute;right:14px;top:50%;transform:translateY(-50%);
    background:var(--amber);color:var(--bg);font-family:'JetBrains Mono';font-weight:700;
    font-size:12px;padding:5px 10px;border-radius:7px;white-space:nowrap;
    box-shadow:0 3px 10px rgba(0,0,0,.4);
  }
  .marker.m2 .ln{background:var(--bubble);box-shadow:0 0 8px var(--bubble-glow);}
  .marker.m2 .grip{background:var(--bubble);}

  .rdash{
    position:absolute;left:0;right:0;bottom:0;z-index:8;
    background:linear-gradient(0deg,var(--panel) 60%,transparent);
    padding:14px 16px 16px;border-top:1px solid var(--line);
  }
  .rmeasure{display:flex;align-items:baseline;justify-content:center;gap:8px;margin-bottom:12px;}
  .rmeasure .big{font-family:'JetBrains Mono';font-weight:700;font-size:40px;color:var(--amber);}
  .rmeasure .unit{font-size:16px;color:var(--txt-dim);letter-spacing:1px;}
  .rmeasure .alt{font-size:13px;color:var(--txt-dim);font-family:'JetBrains Mono';margin-left:6px;}
  .rrow{display:flex;gap:10px;align-items:center;}
  .calib{flex:1;display:flex;flex-direction:column;gap:5px;}
  .calib label{font-size:9px;letter-spacing:1.5px;color:var(--txt-dim);text-transform:uppercase;display:flex;justify-content:space-between;}
  .calib label b{color:var(--amber);font-family:'JetBrains Mono';}
  input[type=range]{-webkit-appearance:none;appearance:none;height:6px;border-radius:3px;background:var(--panel2);border:1px solid var(--line);outline:none;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--amber);box-shadow:0 0 8px rgba(245,180,30,.5);cursor:pointer;}
  input[type=range]::-moz-range-thumb{width:22px;height:22px;border:none;border-radius:50%;background:var(--amber);cursor:pointer;}
  .unitbtn{background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:10px 14px;border-radius:9px;font-family:'Oswald';font-weight:700;font-size:13px;letter-spacing:1px;cursor:pointer;}
  .unitbtn.on{background:var(--amber);color:var(--bg);border-color:var(--amber);}
  .hint{font-size:10px;color:var(--txt-dim);font-family:'JetBrains Mono';text-align:center;margin-top:8px;line-height:1.4;}
  .cardbtn{background:var(--panel2);border:1px solid var(--line);color:var(--txt-dim);font-size:9px;letter-spacing:1px;padding:9px 10px;border-radius:9px;text-transform:uppercase;cursor:pointer;font-family:'Oswald';font-weight:600;}
</style>
</head>
<body>

<header>
  <div class="brand"><b>FIELDKIT</b><span>level · ruler</span></div>
  <div class="stat"><span class="dot" id="sensorDot"></span><span id="sensorTxt">SENSOR OFF</span></div>
</header>

<div class="tabs">
  <div class="tab on" data-view="level">⊕ Level</div>
  <div class="tab" data-view="ruler">▭ Ruler</div>
</div>

<div class="stage">

  <!-- ================= LEVEL VIEW ================= -->
  <div class="view on" id="view-level">
    <div id="perm">
      <svg viewBox="0 0 24 24" fill="none" stroke="#f5b41e" stroke-width="1.4">
        <circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3v18"/><circle cx="12" cy="12" r="2.5" fill="#c4e84a" stroke="none"/>
      </svg>
      <h2>Motion access needed</h2>
      <p>This level reads your phone's tilt sensors. Tap to enable. Lay phone flat to calibrate.</p>
      <button class="btn" id="permBtn">Enable Sensors</button>
      <div class="warn" id="permWarn"></div>
    </div>

    <div class="levelwrap">
      <div class="bullseye">
        <div class="ring r2"></div><div class="ring r1"></div>
        <div class="cross h"></div><div class="cross v"></div>
        <div class="center-target"></div>
        <div class="ball" id="ball"></div>
      </div>

      <div class="vials">
        <div class="vial"><span class="tag">X</span><div class="zone"></div><div class="bub" id="bubX"></div></div>
        <div class="vial"><span class="tag">Y</span><div class="zone"></div><div class="bub" id="bubY"></div></div>
      </div>

      <div class="readout">
        <div class="read"><div class="lab">Pitch</div><div class="num mono" id="pitchN">0<span class="deg">°</span></div></div>
        <div class="read"><div class="lab">Roll</div><div class="num mono" id="rollN">0<span class="deg">°</span></div></div>
      </div>

      <div class="lvlbtns">
        <button class="sbtn" id="zeroBtn">⊙ Zero / Calibrate</button>
        <button class="sbtn" id="holdBtn">⏸ Hold</button>
      </div>
    </div>
  </div>

  <!-- ================= RULER VIEW ================= -->
  <div class="view" id="view-ruler">
    <div class="ruler-stage" id="rulerStage">
      <canvas id="ruler-canvas"></canvas>
      <div class="marker m1" id="mk1" style="top:25%"><div class="ln"></div><div class="grip" id="g1">0</div></div>
      <div class="marker m2" id="mk2" style="top:65%"><div class="ln"></div><div class="grip" id="g2">0</div></div>

      <div class="rdash">
        <div class="rmeasure">
          <span class="big mono" id="measBig">0.0</span>
          <span class="unit" id="measUnit">cm</span>
          <span class="alt mono" id="measAlt"></span>
        </div>
        <div class="rrow">
          <div class="calib">
            <label>Calibration <b><span id="ppmm">3.8</span> px/mm</b></label>
            <input type="range" id="calib" min="2" max="12" step="0.02" value="3.8">
          </div>
          <button class="unitbtn on" id="uCm">cm</button>
          <button class="unitbtn" id="uIn">in</button>
        </div>
        <div class="rrow" style="margin-top:8px">
          <button class="cardbtn" id="cardBtn" style="flex:1">Calibrate w/ bank card (85.6mm)</button>
        </div>
        <div class="hint">Drag the two lines to span what you measure. Slider tweaks scale until on-screen marks match a real ruler.</div>
      </div>
    </div>
  </div>

</div>

<script>
"use strict";
/* ============ TABS ============ */
const tabs=document.querySelectorAll('.tab');
tabs.forEach(t=>t.addEventListener('click',()=>{
  tabs.forEach(x=>x.classList.remove('on'));t.classList.add('on');
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.getElementById('view-'+t.dataset.view).classList.add('on');
  if(t.dataset.view==='ruler') drawRuler();
}));

/* ============ LEVEL ============ */
const ball=document.getElementById('ball');
const bubX=document.getElementById('bubX'), bubY=document.getElementById('bubY');
const pitchN=document.getElementById('pitchN'), rollN=document.getElementById('rollN');
const sDot=document.getElementById('sensorDot'), sTxt=document.getElementById('sensorTxt');
const perm=document.getElementById('perm'), permBtn=document.getElementById('permBtn'), permWarn=document.getElementById('permWarn');
const zeroBtn=document.getElementById('zeroBtn'), holdBtn=document.getElementById('holdBtn');

let offBeta=0, offGamma=0;     // calibration offsets
let held=false, holdSnap=null;
let curBeta=0, curGamma=0;      // smoothed raw
let live=false;
const LVL_TOL=0.6;              // degrees considered "level"

function smooth(prev,next,f){return prev+(next-prev)*f;}

function handleOrient(e){
  if(e.beta===null||e.gamma===null) return;
  if(!live){live=true;sDot.classList.add('live');sTxt.textContent='SENSOR LIVE';}
  // beta: front-back (-180..180), gamma: left-right (-90..90)
  curBeta=smooth(curBeta,e.beta,0.25);
  curGamma=smooth(curGamma,e.gamma,0.25);
  if(!held) render(curBeta-offBeta, curGamma-offGamma);
}

function render(pitch,roll){
  // clamp display
  let p=Math.max(-90,Math.min(90,pitch));
  let r=Math.max(-90,Math.min(90,roll));
  // bullseye ball: map ±25° to edge of travel (≈42% radius)
  const span=25, maxT=42;
  let bx=Math.max(-1,Math.min(1,r/span))*maxT;
  let by=Math.max(-1,Math.min(1,p/span))*maxT;
  ball.style.transform=`translate(calc(-50% + ${bx}%), calc(-50% + ${by}%))`;
  // vials: gamma->X bubble, beta->Y bubble (travel within tube)
  const vmax=120; // px each side cap via %
  bubX.style.transform=`translate(calc(-50% + ${Math.max(-1,Math.min(1,r/span))*vmax}px), -50%)`;
  bubY.style.transform=`translate(calc(-50% + ${Math.max(-1,Math.min(1,p/span))*vmax}px), -50%)`;
  // readouts
  pitchN.innerHTML=p.toFixed(1)+'<span class="deg">°</span>';
  rollN.innerHTML=r.toFixed(1)+'<span class="deg">°</span>';
  const flat=Math.abs(p)<=LVL_TOL && Math.abs(r)<=LVL_TOL;
  ball.classList.toggle('lvl',flat);
  bubX.classList.toggle('lvl',Math.abs(r)<=LVL_TOL);
  bubY.classList.toggle('lvl',Math.abs(p)<=LVL_TOL);
  pitchN.classList.toggle('ok',Math.abs(p)<=LVL_TOL);
  rollN.classList.toggle('ok',Math.abs(r)<=LVL_TOL);
}

function startSensors(){
  window.addEventListener('deviceorientation',handleOrient,true);
  // fallback timeout: if no event fires, warn
  setTimeout(()=>{ if(!live) permWarn.textContent='No sensor data. Use a phone, served over HTTPS.'; },1500);
}

function requestMotion(){
  permWarn.textContent='';
  const D=window.DeviceOrientationEvent;
  if(D && typeof D.requestPermission==='function'){
    D.requestPermission().then(state=>{
      if(state==='granted'){perm.classList.add('hide');startSensors();}
      else permWarn.textContent='Permission denied. Enable Motion & Orientation in Settings ▸ Safari.';
    }).catch(()=>{permWarn.textContent='Request failed — needs a user tap on HTTPS.';});
  }else if(D){
    perm.classList.add('hide');startSensors();
  }else{
    permWarn.textContent='DeviceOrientation unsupported on this browser.';
  }
}
permBtn.addEventListener('click',requestMotion);

zeroBtn.addEventListener('click',()=>{
  offBeta=curBeta;offGamma=curGamma;
  zeroBtn.classList.add('active');setTimeout(()=>zeroBtn.classList.remove('active'),350);
});
holdBtn.addEventListener('click',()=>{
  held=!held;holdBtn.classList.toggle('active',held);
  holdBtn.textContent=held?'▶ Resume':'⏸ Hold';
});

/* desktop preview: no sensor -> let mouse drive for testing */
if(!('ontouchstart' in window) && !(window.DeviceOrientationEvent)){
  perm.classList.add('hide');
}

/* ============ RULER ============ */
const stage=document.getElementById('rulerStage');
const cv=document.getElementById('ruler-canvas'), ctx=cv.getContext('2d');
const calib=document.getElementById('calib'), ppmmL=document.getElementById('ppmm');
const measBig=document.getElementById('measBig'), measUnit=document.getElementById('measUnit'), measAlt=document.getElementById('measAlt');
const uCm=document.getElementById('uCm'), uIn=document.getElementById('uIn'), cardBtn=document.getElementById('cardBtn');
const mk1=document.getElementById('mk1'), mk2=document.getElementById('mk2'), g1=document.getElementById('g1'), g2=document.getElementById('g2');

let pxPerMm=parseFloat(calib.value);
let unit='cm';
let dpr=window.devicePixelRatio||1;

function sizeCanvas(){
  const r=stage.getBoundingClientRect();
  cv.width=r.width*dpr; cv.height=r.height*dpr;
  cv.style.width=r.width+'px'; cv.style.height=r.height+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}

function drawRuler(){
  if(!stage.getBoundingClientRect().height) return;
  sizeCanvas();
  const r=stage.getBoundingClientRect();
  const W=r.width, H=r.height;
  ctx.clearRect(0,0,W,H);
  // ticks every mm down the left edge
  const totalMm=Math.floor(H/pxPerMm);
  for(let mm=0;mm<=totalMm;mm++){
    const y=mm*pxPerMm;
    let len, col='#5a5340', lw=1;
    if(mm%10===0){len=44;col='#f5b41e';lw=2;}
    else if(mm%5===0){len=26;col='#9c7415';}
    else{len=14;}
    ctx.strokeStyle=col;ctx.lineWidth=lw;
    ctx.beginPath();ctx.moveTo(0,y+.5);ctx.lineTo(len,y+.5);ctx.stroke();
    if(mm%10===0){
      ctx.fillStyle='#e9e2cf';ctx.font='13px JetBrains Mono, monospace';ctx.textBaseline='middle';
      ctx.fillText(unit==='cm'?(mm/10):(mm/25.4).toFixed(1), len+8, y+10);
    }
  }
  // inch ticks on right edge if inch mode
  ctx.textAlign='right';
  if(unit==='in'){
    const pxPerIn=pxPerMm*25.4, n=Math.floor(H/pxPerIn);
    for(let i=0;i<=n*16;i++){
      const y=i*pxPerIn/16;
      let len,col='#5a5340';
      if(i%16===0){len=44;col='#f5b41e';}
      else if(i%8===0){len=30;col='#9c7415';}
      else if(i%4===0){len=22;}
      else{len=12;}
      ctx.strokeStyle=col;ctx.beginPath();ctx.moveTo(W,y+.5);ctx.lineTo(W-len,y+.5);ctx.stroke();
    }
  }
  ctx.textAlign='left';
  updateMeasure();
}

function getTop(el){return parseFloat(el.style.top)/100*stage.getBoundingClientRect().height;}
function updateMeasure(){
  const H=stage.getBoundingClientRect().height;
  const y1=getTop(mk1), y2=getTop(mk2);
  const distPx=Math.abs(y2-y1);
  const mm=distPx/pxPerMm;
  if(unit==='cm'){
    measBig.textContent=(mm/10).toFixed(2);measUnit.textContent='cm';
    measAlt.textContent='('+(mm/25.4).toFixed(2)+' in)';
  }else{
    measBig.textContent=(mm/25.4).toFixed(2);measUnit.textContent='in';
    measAlt.textContent='('+(mm/10).toFixed(2)+' cm)';
  }
  g1.textContent=(mm/ (unit==='cm'?10:25.4)).toFixed(0); // not needed numeric; show position
  // show each marker's reading from top(0)
  g1.textContent=fmt(y1);g2.textContent=fmt(y2);
}
function fmt(px){const mm=px/pxPerMm;return unit==='cm'?(mm/10).toFixed(1)+'cm':(mm/25.4).toFixed(2)+'in';}

/* drag markers */
function makeDraggable(el){
  let dragging=false;
  function move(clientY){
    const r=stage.getBoundingClientRect();
    let y=clientY-r.top;
    y=Math.max(0,Math.min(r.height,y));
    el.style.top=(y/r.height*100)+'%';
    updateMeasure();
  }
  el.addEventListener('touchstart',e=>{dragging=true;e.preventDefault();},{passive:false});
  el.addEventListener('touchmove',e=>{if(dragging){move(e.touches[0].clientY);e.preventDefault();}},{passive:false});
  el.addEventListener('touchend',()=>dragging=false);
  el.addEventListener('mousedown',e=>{dragging=true;e.preventDefault();});
  window.addEventListener('mousemove',e=>{if(dragging)move(e.clientY);});
  window.addEventListener('mouseup',()=>dragging=false);
}
makeDraggable(mk1);makeDraggable(mk2);

calib.addEventListener('input',()=>{pxPerMm=parseFloat(calib.value);ppmmL.textContent=pxPerMm.toFixed(2);drawRuler();});
uCm.addEventListener('click',()=>{unit='cm';uCm.classList.add('on');uIn.classList.remove('on');drawRuler();});
uIn.addEventListener('click',()=>{unit='in';uIn.classList.add('on');uCm.classList.remove('on');drawRuler();});

/* credit-card calibration: place card edges between the two markers, then tap */
cardBtn.addEventListener('click',()=>{
  const H=stage.getBoundingClientRect().height;
  const distPx=Math.abs(getTop(mk2)-getTop(mk1));
  if(distPx<20){alert('Spread the two lines to the card height (85.6 mm) first, then tap.');return;}
  pxPerMm=distPx/85.6;
  calib.value=Math.max(2,Math.min(12,pxPerMm));
  ppmmL.textContent=pxPerMm.toFixed(2);
  drawRuler();
});

window.addEventListener('resize',()=>{dpr=window.devicePixelRatio||1;if(document.getElementById('view-ruler').classList.contains('on'))drawRuler();});

/* initial */
ppmmL.textContent=pxPerMm.toFixed(2);
render(0,0);
</script>
</body>
</html>
